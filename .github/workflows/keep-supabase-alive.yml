# Keeps the Supabase free-tier project alive by pinging the database
# every 5 days, preventing the automatic 7-day inactivity pause.
name: Keep Supabase Alive

on:
  schedule:
    # Runs at 08:00 UTC every 5 days (1st, 6th, 11th, 16th, 21st, 26th, 31st)
    - cron: '0 8 */5 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "🏓 Pinging Supabase to keep project alive..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Supabase is alive! (HTTP $RESPONSE)"
          else
            echo "⚠️ Unexpected response: HTTP $RESPONSE"
            exit 1
          fi
